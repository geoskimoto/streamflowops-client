openapi: 3.0.3
info:
  title: StreamFlow DataOps API
  version: 1.0.0
  description: REST API for accessing streamflow discharge data, managing stations,
    and configuring data pulls
paths:
  /api/v1/analytics/computations/:
    get:
      operationId: analytics_computations_list
      description: |-
        Read-only view of the analytics computation registry.
        Supports listing all computations, retrieving detail with recent logs,
        and triggering a manual run.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - analytics
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedScheduledComputationListList'
          description: ''
  /api/v1/analytics/computations/{id}/:
    get:
      operationId: analytics_computations_retrieve
      description: |-
        Read-only view of the analytics computation registry.
        Supports listing all computations, retrieving detail with recent logs,
        and triggering a manual run.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this scheduled computation.
        required: true
      tags:
      - analytics
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledComputation'
          description: ''
  /api/v1/analytics/computations/{id}/trigger/:
    post:
      operationId: analytics_computations_trigger_create
      description: Manually trigger a computation run outside of its schedule.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this scheduled computation.
        required: true
      tags:
      - analytics
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduledComputationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ScheduledComputationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScheduledComputationRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                  task_id:
                    type: string
          description: ''
  /api/v1/analytics/logs/:
    get:
      operationId: analytics_logs_list
      description: Read-only log history for analytics computation runs.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - analytics
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedComputationLogList'
          description: ''
  /api/v1/analytics/logs/{id}/:
    get:
      operationId: analytics_logs_retrieve
      description: Read-only log history for analytics computation runs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this computation log.
        required: true
      tags:
      - analytics
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComputationLog'
          description: ''
  /api/v1/configurations/:
    get:
      operationId: configurations_list
      description: |-
        ViewSet for managing pull configurations.

        list: Get all configurations with filtering
        retrieve: Get a single configuration with details
        create: Create a new configuration
        update: Update a configuration
        partial_update: Partially update a configuration
        destroy: Delete a configuration
      parameters:
      - in: query
        name: data_strategy
        schema:
          type: string
          enum:
          - append
          - overwrite
        description: |-
          * `append` - Append
          * `overwrite` - Overwrite
      - in: query
        name: data_type
        schema:
          type: string
          enum:
          - daily_mean
          - ec_realtime_daily
          - forecast
          - realtime_15min
        description: |-
          * `realtime_15min` - Real-time 15 min
          * `daily_mean` - Daily Mean
          * `forecast` - Forecast
          * `ec_realtime_daily` - EC Wateroffice Daily Mean
      - in: query
        name: is_enabled
        schema:
          type: boolean
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: schedule_type
        schema:
          type: string
          enum:
          - custom
          - daily
          - hourly
          - weekly
        description: |-
          * `hourly` - Hourly
          * `daily` - Daily
          * `weekly` - Weekly
          * `custom` - Custom Cron
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - configurations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPullConfigurationList'
          description: ''
    post:
      operationId: configurations_create
      description: |-
        ViewSet for managing pull configurations.

        list: Get all configurations with filtering
        retrieve: Get a single configuration with details
        create: Create a new configuration
        update: Update a configuration
        partial_update: Partially update a configuration
        destroy: Delete a configuration
      tags:
      - configurations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullConfigurationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PullConfigurationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PullConfigurationCreateRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfigurationCreate'
          description: ''
  /api/v1/configurations/{id}/:
    get:
      operationId: configurations_retrieve
      description: |-
        ViewSet for managing pull configurations.

        list: Get all configurations with filtering
        retrieve: Get a single configuration with details
        create: Create a new configuration
        update: Update a configuration
        partial_update: Partially update a configuration
        destroy: Delete a configuration
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfigurationDetail'
          description: ''
    put:
      operationId: configurations_update
      description: |-
        ViewSet for managing pull configurations.

        list: Get all configurations with filtering
        retrieve: Get a single configuration with details
        create: Create a new configuration
        update: Update a configuration
        partial_update: Partially update a configuration
        destroy: Delete a configuration
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfiguration'
          description: ''
    patch:
      operationId: configurations_partial_update
      description: |-
        ViewSet for managing pull configurations.

        list: Get all configurations with filtering
        retrieve: Get a single configuration with details
        create: Create a new configuration
        update: Update a configuration
        partial_update: Partially update a configuration
        destroy: Delete a configuration
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPullConfigurationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPullConfigurationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPullConfigurationRequest'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfiguration'
          description: ''
    delete:
      operationId: configurations_destroy
      description: |-
        ViewSet for managing pull configurations.

        list: Get all configurations with filtering
        retrieve: Get a single configuration with details
        create: Create a new configuration
        update: Update a configuration
        partial_update: Partially update a configuration
        destroy: Delete a configuration
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/configurations/{id}/disable/:
    post:
      operationId: configurations_disable_create
      description: Disable a configuration.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfiguration'
          description: ''
  /api/v1/configurations/{id}/enable/:
    post:
      operationId: configurations_enable_create
      description: Enable a configuration.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfiguration'
          description: ''
  /api/v1/configurations/{id}/execution_history/:
    get:
      operationId: configurations_execution_history_retrieve
      description: |-
        Get execution history for this configuration.

        Query params:
        - limit: Number of recent executions to return (default: 20)
        - status: Filter by status (success, failed, running)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfiguration'
          description: ''
  /api/v1/configurations/{id}/statistics/:
    get:
      operationId: configurations_statistics_retrieve
      description: |-
        Get detailed statistics for this configuration.

        Includes success rates, performance metrics, and data quality info.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfiguration'
          description: ''
  /api/v1/configurations/{id}/trigger/:
    post:
      operationId: configurations_trigger_create
      description: |-
        Trigger a manual execution of this configuration.

        Starts a Celery task to pull data for all stations in this configuration.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this pull configuration.
        required: true
      tags:
      - configurations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PullConfigurationRequest'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullConfiguration'
          description: ''
  /api/v1/forecasts/:
    get:
      operationId: forecasts_list
      description: List all forecast runs with optional filters.
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
          format: date-time
        description: Filter forecasts before this date
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: run_date
        schema:
          type: string
          format: date-time
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: source
        schema:
          type: string
        description: Filter by source (e.g., NOAA_RFC)
      - in: query
        name: start_date
        schema:
          type: string
          format: date-time
        description: Filter forecasts after this date
      - in: query
        name: station
        schema:
          type: integer
      - in: query
        name: station_number
        schema:
          type: string
        description: Filter by station number
      tags:
      - forecasts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedForecastRunListList'
          description: ''
  /api/v1/forecasts/{id}/:
    get:
      operationId: forecasts_retrieve
      description: Retrieve a specific forecast run with full data.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this forecast run.
        required: true
      tags:
      - forecasts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastRun'
          description: ''
  /api/v1/forecasts/by-station/{station_number}/:
    get:
      operationId: forecasts_by_station_list
      description: |-
        Get all forecast runs for a specific station.

        Returns forecasts ordered by run date (most recent first).
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: run_date
        schema:
          type: string
          format: date-time
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: source
        schema:
          type: string
          enum:
          - NOAA_RFC
        description: '* `NOAA_RFC` - NOAA River Forecast Center'
      - in: query
        name: station
        schema:
          type: integer
      - in: path
        name: station_number
        schema:
          type: string
        required: true
      - in: query
        name: station_number
        schema:
          type: string
        description: Station number
        required: true
      tags:
      - forecasts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedForecastRunList'
          description: ''
  /api/v1/forecasts/latest/:
    get:
      operationId: forecasts_latest_retrieve
      description: Get the most recent forecast run across all stations.
      tags:
      - forecasts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastRun'
          description: ''
  /api/v1/forecasts/statistics/:
    get:
      operationId: forecasts_statistics_retrieve
      description: |-
        Get aggregate statistics for forecast runs.

        Returns counts, date ranges, and average RMSE.
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
          format: date-time
        description: End date for statistics
      - in: query
        name: source
        schema:
          type: string
        description: Filter by source
      - in: query
        name: start_date
        schema:
          type: string
          format: date-time
        description: Start date for statistics
      tags:
      - forecasts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastStatistics'
          description: ''
  /api/v1/logs/:
    get:
      operationId: logs_list
      description: |-
        ViewSet for querying data pull execution logs.

        list: Get all data pull logs with filtering
        retrieve: Get a single log entry
      parameters:
      - in: query
        name: configuration
        schema:
          type: integer
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - failed
          - running
          - success
        description: |-
          * `running` - Running
          * `success` - Success
          * `failed` - Failed
      tags:
      - logs
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDataPullLogListList'
          description: ''
  /api/v1/logs/{id}/:
    get:
      operationId: logs_retrieve
      description: |-
        ViewSet for querying data pull execution logs.

        list: Get all data pull logs with filtering
        retrieve: Get a single log entry
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this data pull log.
        required: true
      tags:
      - logs
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPullLog'
          description: ''
  /api/v1/observations/discharge/:
    get:
      operationId: observations_discharge_list
      description: |-
        ViewSet for querying discharge observations.

        list: Get discharge observations with filtering
        retrieve: Get a single observation
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: quality_code
        schema:
          type: string
          enum:
          - A
          - P
        description: |-
          * `P` - Provisional
          * `A` - Approved
      - in: query
        name: station
        schema:
          type: integer
      - in: query
        name: type
        schema:
          type: string
          enum:
          - daily_mean
          - realtime_15min
        description: |-
          * `realtime_15min` - Real-time 15 min
          * `daily_mean` - Daily Mean
      - in: query
        name: unit
        schema:
          type: string
          enum:
          - cfs
          - cms
        description: |-
          * `cfs` - Cubic Feet per Second
          * `cms` - Cubic Meters per Second
      tags:
      - observations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDischargeObservationList'
          description: ''
  /api/v1/observations/discharge/{id}/:
    get:
      operationId: observations_discharge_retrieve
      description: |-
        ViewSet for querying discharge observations.

        list: Get discharge observations with filtering
        retrieve: Get a single observation
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this discharge observation.
        required: true
      tags:
      - observations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DischargeObservation'
          description: ''
  /api/v1/observations/discharge/percentile-bands/:
    get:
      operationId: observations_discharge_percentile_bands_retrieve
      description: |-
        Return precomputed exceedance percentile bands for all stations on a
        given date.

        Data is populated by the daily Celery task and the historical backfill
        command. Use ``?date=YYYY-MM-DD`` to drive a rangeslider. Omit the
        parameter to get the latest available date.

        Responses for past dates include long-lived Cache-Control and ETag
        headers (data never changes once computed). Today's date is uncached.
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        description: Return bands for this date (YYYY-MM-DD). Defaults to the latest
          date available in the database.
      - in: query
        name: station
        schema:
          type: string
        description: Filter to a single station number.
      tags:
      - observations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PercentileBandsResponse'
          description: ''
  /api/v1/observations/discharge/percentile-date-range/:
    get:
      operationId: observations_discharge_percentile_date_range_retrieve
      description: |-
        Return the min and max dates available in daily_flow_percentiles.

        Use this to set the bounds of the rangeslider in the dashboard.
        Response is cached for 1 hour.
      tags:
      - observations
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
