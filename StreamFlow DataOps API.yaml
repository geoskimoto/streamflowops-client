components:
  schemas:
    AgencyEnum:
      enum:
      - USGS
      - EC
      - NOAA_RFC
      type: string
      description: |-
        * `USGS` - USGS
        * `EC` - Environment Canada
        * `NOAA_RFC` - NOAA River Forecast Center
    BlankEnum:
      enum:
      - ''
    ComputationLog:
      type: object
      description: Full detail serializer for computation run logs.
      properties:
        id:
          type: integer
          readOnly: true
        computation:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/Status363Enum'
          readOnly: true
        celery_task_id:
          type: string
          readOnly: true
        started_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        duration_seconds:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
        records_computed:
          type: integer
          readOnly: true
          nullable: true
        error_message:
          type: string
          readOnly: true
      required:
      - celery_task_id
      - completed_at
      - computation
      - duration_seconds
      - error_message
      - id
      - records_computed
      - started_at
      - status
    DailyFlowPercentile:
      type: object
      description: Single station result within a percentile-bands response.
      properties:
        station_number:
          type: string
        discharge:
          type: number
          format: double
        percentile_rank:
          type: number
          format: double
        band:
          type: string
        historical_record_count:
          type: integer
      required:
      - band
      - discharge
      - historical_record_count
      - percentile_rank
      - station_number
    DataPullLog:
      type: object
      description: Serializer for data pull logs.
      properties:
        id:
          type: integer
          readOnly: true
        configuration:
          type: integer
        configuration_name:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/Status363Enum'
        records_processed:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: string
          readOnly: true
        error_message:
          type: string
      required:
      - configuration
      - configuration_name
      - duration_seconds
      - id
      - start_time
      - status
    DataPullLogList:
      type: object
      description: Lightweight serializer for log lists.
      properties:
        id:
          type: integer
          readOnly: true
        configuration:
          type: integer
        configuration_name:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/Status363Enum'
        records_processed:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
      required:
      - configuration
      - configuration_name
      - id
      - start_time
      - status
    DataSourceEcfEnum:
      enum:
      - USGS
      - EC
      - NOAA
      - NOAA_RFC
      type: string
      description: |-
        * `USGS` - USGS NWIS
        * `EC` - Environment Canada
        * `NOAA` - NOAA National Water Model
        * `NOAA_RFC` - NOAA River Forecast Center
    DataStrategyEnum:
      enum:
      - append
      - overwrite
      type: string
      description: |-
        * `append` - Append
        * `overwrite` - Overwrite
    DataTypeEnum:
      enum:
      - realtime_15min
